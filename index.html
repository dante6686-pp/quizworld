<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizWorld - Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="navbar" class="navbar hidden">
        <div class="user-profile">
            <span id="nav-avatar"></span>
            <span id="nav-username" style="font-weight: bold;"></span>
        </div>
        <button id="btn-logout" class="secondary" style="width: auto; padding: 5px 10px;">Wyloguj</button>
    </div>

    <div id="screen-home" class="screen active">
        <h1>Witaj w QuizWorld</h1>
        <button onclick="switchScreen('screen-auth')">Zaloguj się, aby grać</button>
        <h3>Aktywne pokoje:</h3>
        <div id="home-room-list"></div>
    </div>

    <div id="screen-auth" class="screen">
        <h1>Logowanie</h1>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Hasło">
        <button id="btn-login">Zaloguj</button>
        <button class="secondary" onclick="switchScreen('screen-home')">Wróć</button>
    </div>

    <div id="screen-dashboard" class="screen">
        <h2>Panel Gracza</h2>
        <button id="btn-show-create-room">➕ Stwórz pokój</button>
        <div id="room-list"></div>
    </div>

    <div id="screen-room" class="screen">
        <h2 id="room-view-title">Pokój</h2>
        <button id="btn-start-my-quiz">▶️ START QUIZU</button>
        <div id="room-players-list"></div>
        <button class="secondary" id="btn-leave-room">Wyjdź</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="question-box" id="quiz-question-text"></div>
        <div id="quiz-answer-buttons" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div id="screen-results" class="screen">
        <h2>Wyniki</h2>
        <div id="waiting-message">⏳ Czekamy na resztę...</div>
        <div id="podium-container" class="hidden"><h3>Podium:</h3></div>
        <div id="final-leaderboard"></div>
        <button id="btn-return-to-dash">Wróć do panelu</button>
    </div>
</div>

<div id="debug-log" style="background: black; color: #0f0; padding: 10px; margin: 20px; font-family: monospace; border: 2px solid red;">
    LOGI STARTOWE:
</div>
<script type="module" src="game.js"></script>



</body>
</html>
