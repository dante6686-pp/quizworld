<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizWorld - Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div id="navbar" class="navbar hidden">
        <div class="user-profile">
            <span id="nav-avatar" style="font-size: 24px;"></span>
            <div><div id="nav-username" style="font-weight: bold;"></div></div>
        </div>
        <button id="btn-logout" style="width: auto; background: var(--danger); color: white;">Wyloguj</button>
    </div>

    <div id="screen-auth" class="screen active"><h1>QuizWorld Login</h1><input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-pass" placeholder="HasЕ‚o"><button id="btn-login">Zaloguj</button><a href="#" id="link-register">Rejestracja</a></div>
    <div id="register-form" class="screen hidden"><h3>Awatar</h3><div class="avatar-selection"><span class="avatar-option selected" data-avatar="рџ‘ЁвЂЌрџљЂ">рџ‘ЁвЂЌрџљЂ</span><span class="avatar-option" data-avatar="рџҐ·">рџҐ·</span></div><input type="text" id="reg-username" placeholder="Nick"><input type="email" id="reg-email" placeholder="Email"><input type="password" id="reg-pass" placeholder="HasЕ‚o"><button id="btn-register">StwГіrz</button></div>
    <div id="screen-dashboard" class="screen"><h2>Pokoje</h2><button id="btn-show-create-room">вћ• Nowy PokГіj</button><div id="room-list"></div></div>
    <div id="screen-create-room" class="screen"><h2>Tworzenie</h2><select id="room-category"><option value="Wszystkie">Wszystkie</option><option value="Lata 90">Lata 90</option></select><input type="number" id="room-q-count" value="5"><button id="btn-create-room-confirm">StwГіrz</button></div>
    <div id="screen-room" class="screen"><h2 id="room-view-title"></h2><button id="btn-start-my-quiz">в–¶пёЏ START</button><div id="room-players-list"></div><button class="secondary" id="btn-leave-room">WyjdЕє</button></div>
    <div id="screen-quiz" class="screen"><div id="quiz-progress-text"></div><div class="question-box" id="quiz-question-text"></div><div id="quiz-answer-buttons" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div></div>
    <div id="screen-results" class="screen"><h2>Wyniki</h2><div id="waiting-message">вЏі Czekam na resztД™...</div><div id="podium-container" class="hidden">...podium...</div><div id="final-leaderboard"></div><button id="btn-return-to-dash">WrГіД‡</button></div>
</div>
<script type="module" src="game.js"></script>
</body>
</html>
